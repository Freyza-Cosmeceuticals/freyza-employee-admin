name: Deploy Supabase Migrations to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # vercel naming scheme for auto created environments (This is the _production_ deployment for the prod project)
    environment: "Production"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link and Push Migrations
        run: |
          supabase link --project-ref $PROJECT_ID --password $DB_PASSWORD
          supabase db push --linked --password $DB_PASSWORD
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
