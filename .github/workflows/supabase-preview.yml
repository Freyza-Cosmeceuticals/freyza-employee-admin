name: Deploy Supabase Migrations to Preview

on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: "Production – freyza-employee-admin-preview"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dummy Echo Stuff
        run: |
          echo "PROJECT_ID=$PROJECT_ID"
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}

      # - name: Link and Push Migrations
      #   run: |
      #     supabase link --project-ref $PROJECT_ID --password $DB_PASSWORD
      #     supabase db push --password $DB_PASSWORD
